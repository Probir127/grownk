<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4900F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dark square background with rounded corners -->
  <rect width="512" height="512" fill="#000000" rx="64"/>
  
  <!-- Full GROWNK text, stretched to match the logo proportions -->
  <text x="256" y="300" text-anchor="middle" textLength="460" lengthAdjust="spacingAndGlyphs" font-family="Impact, Arial Black, sans-serif" font-weight="bold" font-size="140">
    <tspan fill="#FFFFFF">GROWN</tspan><tspan fill="url(#goldGrad)">K</tspan>
  </text>
  
  <!-- Small sparkle accent -->
  <g transform="translate(450, 310) scale(0.8)" fill="#F5A623" opacity="0.9">
    <polygon points="12,0 14.5,9.5 24,12 14.5,14.5 12,24 9.5,14.5 0,12 9.5,9.5"/>
  </g>
</svg>